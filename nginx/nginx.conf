# RateLock — Nginx reverse proxy
# Serves the built frontend (SPA) and routes /api/* + /health to the backend.
# Used by the `web` service in docker-compose.

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    keepalive_timeout 65;
    server_tokens   off;

    # gzip
    gzip              on;
    gzip_vary         on;
    gzip_min_length   1024;
    gzip_proxied      any;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml image/svg+xml font/woff2;

    server {
        listen 80;
        server_name _;

        root  /usr/share/nginx/html;
        index index.html;

        # Resolve the backend hostname lazily (per request) via Docker's
        # embedded DNS, so nginx starts even if the backend isn't up yet and
        # follows the backend's IP if it restarts.
        resolver 127.0.0.11 valid=30s ipv6=off;
        set $rl_backend "backend:4000";

        # ---- API + rate-limit hot path -> backend ----
        location /api/ {
            proxy_pass         http://$rl_backend$request_uri;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ---- backend healthcheck passthrough ----
        location = /health {
            proxy_pass       http://$rl_backend/health;
            proxy_set_header Host $host;
        }

        # ---- hashed static assets: cache hard ----
        location /assets/ {
            expires    30d;
            add_header Cache-Control "public, immutable";
            try_files  $uri =404;
        }

        # ---- SPA: everything else falls back to index.html ----
        location / {
            try_files $uri $uri/ /index.html;
        }
    }
}
