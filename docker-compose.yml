services:

  db:
    image: postgres:15-alpine
    container_name: ratelock_db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ratelock
    volumes:
      - ratelock_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d ratelock" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: ratelock_redis
    ports:
      - "6397:6397"
    env_file:
      - .env.local
    command: redis-server --requirepass ${REDIS_PASSWORD}  --bind 0.0.0.0
    volumes:
      - ratelock_redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  ratelock_data:
  ratelock_redis_data:

