services:
  
     db:
      image: postgres:15-alpine
      container_name: ratelock_db
      ports:
       - "5432:5432"
      environment:
        POSTGRES_USER: postgres
        POSTGRES_PASSWORD: postgres
        POSTGRES_DB: ratelock
      volumes:
       - ratelock_data:/var/lib/postgresql/data
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -U postgres -d ratelock"]
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 30s



volumes:
  ratelock_data:
  
